server:
  port: 8081


spring:
  datasource:
    url: jdbc:mysql://category-mysql:3306/categorydb?createDatabaseIfNotExist=true
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true


eureka:
  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: http://eureka-server:8761/eureka/